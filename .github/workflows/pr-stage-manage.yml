name: 🚦 PR Stage Manager

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled

  pull_request_review:
    types:
      - submitted

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: pr-stage-manager-${{ github.event.pull_request.number || github.event.review.pull_request.number }}
  cancel-in-progress: true

jobs:
  stage-manager:
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate PR Pipeline
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 #v9.0.0

        with:
          # Use built-in token instead of PAT
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Prevent bot recursion — skip execution if triggered by the github-actions bot
            if (context.actor === 'github-actions[bot]') {
              core.info('Skipping workflow run for github-actions[bot]');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // --------------------------------------------------
            // SAFELY RESOLVE PR NUMBER
            // --------------------------------------------------

            const prNumber =
              context.payload.pull_request?.number ||
              context.payload.review?.pull_request_url?.split('/').pop();

            if (!prNumber) {
              core.setFailed('Unable to determine PR number');
              return;
            }

            // --------------------------------------------------
            // WAIT FOR LABELS TO SYNC
            // --------------------------------------------------

            if (
              context.payload.action &&
              ['opened', 'synchronize'].includes(
                context.payload.action
              )
            ) {
              await new Promise(r =>
                setTimeout(r, 15000)
              );
            }

            // --------------------------------------------------
            // FETCH LABELS
            // --------------------------------------------------

            const { data: labelData } =
              await github.rest.issues.listLabelsOnIssue({
                owner,
                repo,
                issue_number: Number(prNumber)
              });

            const labels =
              labelData.map(l =>
                l.name.toLowerCase()
              );

            // --------------------------------------------------
            // PROGRAM DETECTION
            // --------------------------------------------------

            let isGSSOC =
              labels.includes('gssoc26');

            let isNSOC =
              labels.includes('nsoc26');

            // ── Dual-label guard ────────────────────────────────────────────
            // If a PR somehow carries both gssoc26 and nsoc26 labels (e.g. from
            // a conflicting PR body), normalise to GSSoC-only here so that ALL
            // downstream stage logic (stage2Passed, typeBadge, comment text)
            // uses a single, consistent program classification.
            // Single-label PRs are entirely unaffected by this block.
            const isDualLabel = isGSSOC && isNSOC;
            if (isDualLabel) {
              isNSOC = false; // GSSoC takes priority — discard NSoC classification
              core.warning(`PR #${prNumber}: dual-label detected (gssoc26 + nsoc26) — resolved to GSSoC priority`);
              
              // Remove the conflicting label from GitHub to prevent downstream workflows from reading stale state
              try {
                await removeLabel('nsoc26');
              } catch (e) {
                core.warning(`Failed to remove 'nsoc26' label from GitHub: ${e.message}`);
              }
            }
            // ────────────────────────────────────────────────────────────────

            // --------------------------------------------------
            // STAGE 1
            // --------------------------------------------------

            const dcoVerified =
              labels.includes('dco-verified');

            const dcoMissing =
              labels.includes('dco-missing');

            const aiSlop =
              labels.includes('ai-slop') ||
              labels.includes('gssoc:ai-slop');

            const duplicatePR =
              labels.includes(
                'possible-duplicate-pr'
              );

            const gssocSpam =
              labels.includes('gssoc:spam');

            const gssocInvalid =
              labels.includes('gssoc:invalid');

            const stage1Passed =
              dcoVerified &&
              !dcoMissing &&
              !aiSlop &&
              !gssocSpam &&
              !gssocInvalid;

            // --------------------------------------------------
            // STAGE 2
            // --------------------------------------------------

            const mentorApproved =
              labels.includes(
                'gssoc-mentor-approved'
              ) ||
              labels.includes(
                'mentor-approved'
              );

            const reviewerApproved =
              labels.includes(
                'review-approved'
              );

            const stage2Passed =
              isNSOC
                ? stage1Passed
                : isGSSOC
                  ? mentorApproved
                  : (
                      mentorApproved ||
                      reviewerApproved
                    );

            // --------------------------------------------------
            // STAGE 3
            // --------------------------------------------------

            const gssocApproved =
              labels.includes(
                'gssoc:approved'
              );

            const paApproved =
              labels.includes(
                'pa-approved'
              ) ||
              gssocApproved;

            const mergeReady =
              labels.includes(
                'merge-ready'
              );

            // --------------------------------------------------
            // LABEL HELPERS
            // --------------------------------------------------

            async function addLabel(name) {

              try {

                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: Number(prNumber),
                  labels: [name]
                });

                core.info(
                  `Added label: ${name}`
                );

              } catch (e) {

                core.warning(
                  `Failed adding label '${name}': ${e.message}`
                );
              }
            }

            async function removeLabel(name) {

              try {

                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: Number(prNumber),
                  name
                });

                core.info(
                  `Removed label: ${name}`
                );

              } catch (_) {}
            }

            // --------------------------------------------------
            // UPDATE LABEL STATES
            // --------------------------------------------------

            if (stage1Passed) {

              await addLabel(
                'stage-1-approved'
              );

              await removeLabel(
                'needs-stage-1-fixes'
              );

              if (
                !mentorApproved &&
                !reviewerApproved &&
                isGSSOC
              ) {

                await addLabel(
                  'needs-mentor-review'
                );

                await addLabel(
                  'mentor-review-requested'
                );
              }

            } else {

              await removeLabel(
                'stage-1-approved'
              );

              await addLabel(
                'needs-stage-1-fixes'
              );

              await removeLabel(
                'needs-mentor-review'
              );

              await removeLabel(
                'mentor-review-requested'
              );
            }

            // --------------------------------------------------
            // STATUS TEXT
            // --------------------------------------------------

            let s1Icon = '⏳';
            let s1Text =
              'Waiting for automated checks';

            if (stage1Passed) {

              s1Icon = '✅';
              s1Text =
                'All automated checks passed';

            } else if (
              dcoMissing ||
              aiSlop ||
              gssocSpam ||
              gssocInvalid
            ) {

              s1Icon = '❌';
              s1Text =
                'Failed — fixes required';
            }

            let s2Icon = '🔒';
            let s2Text =
              'Blocked until Stage 1 passes';

            if (stage1Passed) {

              if (isNSOC) {

                s2Icon = '✅';

                s2Text =
                  'NSOC bypasses mentor review';

              } else {

                s2Icon = '⏳';

                s2Text = isGSSOC
                  ? 'Awaiting GSSOC mentor review'
                  : 'Awaiting reviewer approval';

                if (stage2Passed) {

                  s2Icon = '✅';

                  s2Text = isGSSOC
                    ? 'Mentor approved'
                    : 'Reviewer approved';
                }
              }
            }

            let s3Icon = '🔒';
            let s3Text =
              'Blocked until Stage 2 passes';

            if (
              stage1Passed &&
              stage2Passed
            ) {

              s3Icon = '⏳';

              s3Text =
                'Awaiting maintainer review';

              if (
                paApproved ||
                mergeReady
              ) {

                s3Icon = '✅';

                s3Text =
                  'Ready to merge';
              }
            }

            // --------------------------------------------------
            // DETAILS
            // --------------------------------------------------

            const details = [];

            if (!dcoVerified)
              details.push(
                'DCO verification pending'
              );

            if (dcoMissing)
              details.push(
                'DCO sign-off missing'
              );

            if (aiSlop)
              details.push(
                'AI/slop detection triggered'
              );

            if (duplicatePR)
              details.push(
                'Possible duplicate PR'
              );

            if (gssocSpam)
              details.push(
                'Marked as GSSOC spam'
              );

            if (gssocInvalid)
              details.push(
                'Marked as GSSOC invalid'
              );

            // --------------------------------------------------
            // BADGE
            // --------------------------------------------------

            // When a dual-label conflict was auto-resolved, append a notice to
            // the badge so maintainers can see that the priority rule was applied.
            const typeBadge =
              isGSSOC
                ? isDualLabel
                  ? '> 🟢 **GSSOC PR** _(dual-label conflict auto-resolved — GSSoC priority applied)_'
                  : '> 🟢 **GSSOC PR**'
                : isNSOC
                  ? '> 🔵 **NSOC PR**'
                  : '> ⚪ **Standard PR**';

            // --------------------------------------------------
            // COMMENT BODY
            // --------------------------------------------------

            const marker =
              '<!-- pr-stage-manager -->';

            let body =
              marker + '\n';

            body +=
              '## 🚦 PR Review Pipeline\n';

            body +=
              typeBadge + '\n\n';

            body +=
              '| Stage | Status |\n';

            body +=
              '|-------|--------|\n';

            body +=
              `| **Stage 1 — Automated Checks** | ${s1Icon} ${s1Text} |\n`;

            body +=
              `| **Stage 2 — Mentor/Reviewer** | ${s2Icon} ${s2Text} |\n`;

            body +=
              `| **Stage 3 — Maintainer** | ${s3Icon} ${s3Text} |\n\n`;

            if (details.length > 0) {

              body +=
                details
                  .map(d => `> - ${d}`)
                  .join('\n');

              body += '\n\n';

            } else {

              body +=
                '> No active issues\n\n';
            }

            body +=
              '---\n';

            body +=
              `**Last updated:** ${new Date().toUTCString()}`;

            // --------------------------------------------------
            // FIND EXISTING COMMENT
            // --------------------------------------------------

            const { data: comments } =
              await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: Number(prNumber),
                per_page: 100
              });

            const existing =
              comments.find(comment =>
                comment.body &&
                comment.body.includes(marker)
              );

            // --------------------------------------------------
            // AVOID SPAM UPDATES
            // --------------------------------------------------

            if (existing) {

              const oldContent =
                existing.body
                  .replace(
                    /\*\*Last updated:\*\*.*$/,
                    ''
                  )
                  .trim();

              const newContent =
                body
                  .replace(
                    /\*\*Last updated:\*\*.*$/,
                    ''
                  )
                  .trim();

              if (
                oldContent === newContent
              ) {

                core.info(
                  'Pipeline state unchanged'
                );

                return;
              }

              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });

              core.info(
                'Updated pipeline comment'
              );

            } else {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: Number(prNumber),
                body
              });

              core.info(
                'Created pipeline comment'
              );
            }
