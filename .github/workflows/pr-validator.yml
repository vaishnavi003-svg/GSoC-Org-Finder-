name: 🔍 Validate PR

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: validate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR structure
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 #v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const prNumber = pr.number;
            const body = pr.body || '';
            const title = pr.title || '';
            const username = pr.user.login;

            const lowerBody = body.toLowerCase();

            let warnings = [];
            let criticalWarnings = [];

            // Ignore bots
            if (pr.user.type === 'Bot') {
              core.info('Skipping bot PR');
              return;
            }

            // ------------------------------------------------
            // LINKED ISSUE VALIDATION
            // ------------------------------------------------

            const issueRegex =
              /(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#(\d+)/ig;

            const linkedIssues = [];
            let match;

            while ((match = issueRegex.exec(body)) !== null) {
              linkedIssues.push(match[2]);
            }

            if (linkedIssues.length === 0) {

              criticalWarnings.push(
                '❌ Missing linked issue. Add `Closes #issue-number` to the PR body.'
              );

              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: ['missing-linked-issue']
                });
              } catch (e) {}

            } else {

              // Remove label if fixed
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: prNumber,
                  name: 'missing-linked-issue'
                });
              } catch (e) {}

              // Validate issue existence
              for (const issueNum of linkedIssues) {

                try {

                  await github.rest.issues.get({
                    owner,
                    repo,
                    issue_number: Number(issueNum)
                  });

                } catch (e) {

                  criticalWarnings.push(
                    `❌ Linked issue #${issueNum} does not exist.`
                  );
                }
              }
            }

            // ------------------------------------------------
            // PROGRAM TAGS
            // ------------------------------------------------

            const mentionsNSOC = lowerBody.includes('nsoc');
            const mentionsGSSOC = lowerBody.includes('gssoc');

            if (!mentionsNSOC && !mentionsGSSOC) {
              warnings.push(
                '⚠️ Missing contribution program declaration (`GSSOC` or `NSOC`).'
              );
            }

            // ── Dual-label guard ────────────────────────────────────────────
            // If the PR body mentions BOTH programs, apply GSSoC priority and
            // discard the NSoC signal. A conflict comment is posted to inform
            // the contributor. Single-label PRs are unaffected by this block.
            const isDualLabel = mentionsGSSOC && mentionsNSOC;
            const effectiveGSSOC = mentionsGSSOC;                    // GSSoC always wins
            const effectiveNSOC  = mentionsNSOC && !mentionsGSSOC;   // NSoC only when GSSoC absent
            // ────────────────────────────────────────────────────────────────

            // ------------------------------------------------
            // LABEL MANAGEMENT
            // ------------------------------------------------
            try {

              for (const label of ['nsoc26', 'gssoc26']) {

                try {

                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: prNumber,
                    name: label
                  });

                } catch (e) {}
              }

              // Apply only the effective (post-resolution) program label
              if (effectiveNSOC) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: ['nsoc26']
                });
              }

              if (effectiveGSSOC) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: ['gssoc26']
                });
              }

              // Notify contributor when a dual-label conflict was auto-resolved
              if (isDualLabel) {
                // Fetch existing comments to prevent duplicate spam on subsequent workflow triggers
                const comments = await github.rest.issues.listComments({
                  owner,
                  repo,
                  issue_number: prNumber,
                  per_page: 100
                });

                const marker = '<!-- dual-label-conflict-notice -->';
                const hasNotice = comments.data.some(c => c.body && c.body.includes(marker));

                if (!hasNotice) {
                  const dualLabelComment =
                    `${marker}\n` +
                    `## ⚠️ Dual Program Label Detected\n\n` +
                    `Hi @${username},\n\n` +
                    `Your PR description mentions **both GSSOC and NSOC**.\n\n` +
                    `| Detected Labels | Resolution |\n` +
                    `|----------------|------------|\n` +
                    `| \`gssoc\`, \`nsoc\` | **GSSoC priority applied** — classified as a GSSoC PR |\n\n` +
                    `> ℹ️ Only one program label may be active at a time. ` +
                    `GSSoC takes priority when both are present.\n\n` +
                    `If this is incorrect, please:\n` +
                    `1. Remove the unintended program keyword from your PR description\n` +
                    `2. Push a new commit or re-open the PR to re-trigger classification\n\n` +
                    `📖 See our [Contributing Guide](https://github.com/${owner}/${repo}/blob/main/CONTRIBUTING.md) for labeling details.`;

                  await github.rest.issues.createComment({
                    owner, repo, issue_number: prNumber, body: dualLabelComment
                  });
                  core.info(`PR #${prNumber}: Posted dual-label conflict comment.`);
                } else {
                  core.info(`PR #${prNumber}: Dual-label conflict comment already exists. Skipping duplicate.`);
                }
                core.warning(`Dual-label conflict on PR #${prNumber} — resolved to GSSoC priority`);
              }
            } catch (e) {

              core.warning(`Label operation failed: ${e.message}`);
            }

            // ------------------------------------------------
            // REQUIRED TEMPLATE SECTIONS
            // ------------------------------------------------

            const requiredSections = [
              'description',
              'related issue',
              'type of change',
              'checklist'
            ];

            for (const section of requiredSections) {

              if (!lowerBody.includes(section)) {

                warnings.push(
                  `⚠️ Missing PR template section: \`${section}\``
                );
              }
            }

            // ------------------------------------------------
            // CONVENTIONAL TITLE
            // ------------------------------------------------

            const conventionalRegex =
              /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore)(\(.+\))?: .+/i;

            if (!conventionalRegex.test(title)) {

              warnings.push(
                '⚠️ PR title must follow conventional commits. Example: `feat: improve mobile navbar`'
              );
            }

            // ------------------------------------------------
            // FILE / DIFF ANALYSIS
            // ------------------------------------------------

            const { data: prFiles } =
              await github.rest.pulls.listFiles({
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100
              });

            const totalAdditions =
              prFiles.reduce((sum, f) => sum + f.additions, 0);

            const totalDeletions =
              prFiles.reduce((sum, f) => sum + f.deletions, 0);

            const totalChanges =
              totalAdditions + totalDeletions;

            const filesChanged = prFiles.length;

            const isFix = /^fix/i.test(title);
            const isDocs = /^docs/i.test(title);
            const isStyle = /^style/i.test(title);

            if (isFix && totalChanges > 500) {

              warnings.push(
                `⚠️ Very large bug-fix PR (${totalChanges} lines changed). Consider splitting into smaller PRs.`
              );
            }

            if (isDocs && totalChanges > 1000) {

              warnings.push(
                `⚠️ Extremely large documentation PR (${totalChanges} lines).`
              );
            }

            if (isStyle && totalChanges > 300) {

              warnings.push(
                `⚠️ Large style-only PR (${totalChanges} lines).`
              );
            }

            const unrelatedExtensions =
              new Set(
                prFiles.map(f =>
                  f.filename.split('.').pop()
                )
              );

            if (
              unrelatedExtensions.size > 5 &&
              totalChanges > 250
            ) {

              warnings.push(
                `⚠️ PR touches many unrelated file types (${unrelatedExtensions.size}) and may be too broad.`
              );
            }

            // ------------------------------------------------
            // DEPENDENCY CHECK
            // ------------------------------------------------

            const lockFiles = [
              'package-lock.json',
              'yarn.lock',
              'pnpm-lock.yaml'
            ];

            const touchesLockFiles =
              prFiles.some(f =>
                lockFiles.some(l =>
                  f.filename.endsWith(l)
                )
              );

            if (touchesLockFiles) {

              criticalWarnings.push(
                '❌ Dependency lockfile changes detected. This repository follows a zero-dependency philosophy.'
              );
            }

            // ------------------------------------------------
            // LABELS
            // ------------------------------------------------

            const hasCritical =
              criticalWarnings.length > 0;

            try {

              if (hasCritical) {

                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: ['needs-pr-fixes']
                });

              } else {

                try {

                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: prNumber,
                    name: 'needs-pr-fixes'
                  });

                } catch (e) {}
              }

            } catch (e) {}

            // ------------------------------------------------
            // BUILD COMMENT
            // ------------------------------------------------

            let bodyMessage = '';

            if (hasCritical || warnings.length > 0) {

              bodyMessage =
                `## ⚠️ PR Validation Issues\n\n` +
                `Hi @${username}, your PR requires fixes before review.\n\n`;

              if (criticalWarnings.length > 0) {

                bodyMessage +=
                  `### Critical Issues\n\n` +
                  criticalWarnings.map(w => `- ${w}`).join('\n') +
                  `\n\n`;
              }

              if (warnings.length > 0) {

                bodyMessage +=
                  `### Warnings\n\n` +
                  warnings.map(w => `- ${w}`).join('\n') +
                  `\n\n`;
              }

              if (criticalWarnings.some(w =>
                w.includes('Missing linked issue')
              )) {

                bodyMessage +=
                  `⚠️ PRs without linked issues may be automatically closed after 48 hours if unresolved.\n\n`;
              }

              bodyMessage +=
                `Please push fixes after updating the PR.`;

            } else {

              bodyMessage =
                `## ✅ PR Validation Passed\n\n` +
                `Hi @${username}, automated PR validation checks passed.\n\n` +
                `Your PR is ready for review.`;
            }

            // ------------------------------------------------
            // UPSERT COMMENT
            // ------------------------------------------------

            const { data: comments } =
              await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100
              });

            const marker =
              '<!-- pr-validator-comment -->';

            bodyMessage = `${marker}\n${bodyMessage}`;

            const existing = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes(marker)
            );

            if (existing) {

              if (
                existing.body.trim() !==
                bodyMessage.trim()
              ) {

                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: bodyMessage
                });
              }

            } else {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: bodyMessage
              });
            }
