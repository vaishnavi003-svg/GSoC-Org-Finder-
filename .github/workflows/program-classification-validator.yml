name: 🧭 Program Classification Validator

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: program-classification-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-program:
    name: Validate PR Program Classification

    if: github.event.pull_request.draft == false

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
      # No checkout/setup-node needed for actions/github-script-only workflow
      - name: Validate classification
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 #v9.0.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            // Prevent bot recursion — skip execution if triggered by the github-actions bot
            if (context.actor === 'github-actions[bot]') {
              core.info('Skipping workflow run for github-actions[bot]');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const pr = context.payload.pull_request;
            const issue_number = pr.number;

            const body = (pr.body || '').toLowerCase();
            const branch = (pr.head.ref || '').toLowerCase();

            const labels =
              (pr.labels || [])
                .map(l => l.name.toLowerCase());

            const MARKER =
              '<!-- program-classification -->';

            const ACTUAL_PROGRAMS = [
              'gssoc26',
              'nsoc26'
            ];

            const FALLBACK_PROGRAM =
              'general-oss';

            const VALID_LABELS = [
              ...ACTUAL_PROGRAMS,
              FALLBACK_PROGRAM
            ];

            const MISSING_LABEL =
              'missing-program-classification';

            const INVALID_LABEL =
              'invalid-program-classification';

            // ----------------------------------------
            // DETECTION HELPERS
            // ----------------------------------------

            function detectProgram() {
              const actualPrograms = new Set();
              let hasGeneralContribution = false;

              // ------------------------------------
              // Metadata - new template format
              // ------------------------------------

              if (
                body.includes('- [x] gssoc26') ||
                body.includes('program: gssoc') ||
                body.includes('- [x] gssoc')
              ) {
                actualPrograms.add('gssoc');
              }

              if (
                body.includes('- [x] nsoc26') ||
                body.includes('program: nsoc') ||
                body.includes('- [x] nsoc')
              ) {
                actualPrograms.add('nsoc');
              }

              if (
                body.includes('- [x] general contribution') ||
                body.includes('program: general')
              ) {
                hasGeneralContribution = true;
              }

              // ------------------------------------
              // Labels - ACTUAL PROGRAMS
              // ------------------------------------

              if (labels.includes('gssoc26')) {
                actualPrograms.add('gssoc');
              }

              if (labels.includes('nsoc26')) {
                actualPrograms.add('nsoc');
              }

              // ------------------------------------
              // Labels - FALLBACK PROGRAM
              // ------------------------------------

              if (
                labels.includes('general-oss')
              ) {
                hasGeneralContribution = true;
              }

              // ------------------------------------
              // Branch hints - ACTUAL PROGRAMS
              // ------------------------------------

              if (branch.includes('gssoc')) {
                actualPrograms.add('gssoc');
              }

              if (branch.includes('nsoc')) {
                actualPrograms.add('nsoc');
              }

              return {
                actual: [...actualPrograms],
                fallback: hasGeneralContribution
              };
            }

            const detected = detectProgram();
            const detectedActualPrograms = detected.actual;
            const hasGeneralContribution = detected.fallback;

            // ── Dual-label guard ────────────────────────────────────────────
            // If both GSSoC and NSoC signals/labels are detected, apply the
            // priority rule (GSSoC takes priority) and discard the NSoC signal
            // so exactly one program classification is validated and applied.
            if (detectedPrograms.includes('gssoc') && detectedPrograms.includes('nsoc')) {
              const nsocIndex = detectedPrograms.indexOf('nsoc');
              if (nsocIndex > -1) {
                detectedPrograms.splice(nsocIndex, 1);
              }
              core.warning('Dual-label program classification detected (gssoc + nsoc) — resolved to GSSoC priority');
            }
            // ────────────────────────────────────────────────────────────────

            // ----------------------------------------

            // LABEL HELPERS
            // ----------------------------------------

            async function addLabels(list) {
              if (!list.length) return;

              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: list
                });
              } catch (e) {
                core.warning(e.message);
              }
            }

            async function removeLabel(name) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name
                });
              } catch (e) {}
            }

            async function clearValidationLabels() {
              await removeLabel(MISSING_LABEL);
              await removeLabel(INVALID_LABEL);
            }

            async function clearProgramLabels() {
              for (const label of VALID_LABELS) {
                await removeLabel(label);
              }
            }

            // ----------------------------------------
            // STICKY COMMENT HELPERS
            // ----------------------------------------

            const comments =
              await github.paginate(
                github.rest.issues.listComments,
                {
                  owner,
                  repo,
                  issue_number,
                  per_page: 100
                }
              );

            const existing =
              comments.find(c =>
                c.user &&
                c.user.type === 'Bot' &&
                (c.body || '').includes(MARKER)
              );

            async function upsertComment(body) {

              if (
                existing &&
                existing.body.trim() === body.trim()
              ) {
                core.info(
                  'Comment already up-to-date'
                );
                return;
              }

              if (existing) {

                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });

                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

            // ----------------------------------------
            // MISSING PROGRAM
            // ----------------------------------------

            if (detectedActualPrograms.length === 0) {

              await clearProgramLabels();

              await addLabels([
                MISSING_LABEL
              ]);

              const comment =
                `${MARKER}

            ## ⚠️ Program Classification Required

            Your PR does not currently specify a valid contribution program.

            Please edit your PR description and select exactly ONE:

            - GSSOC
            - NSOC
            - General Contribution

            ### Example

            \`\`\`md
            program: gssoc
            \`\`\`

            or use the PR template checkboxes.

            Once updated, this validation will automatically re-run.

            > Stage-2 review routing is temporarily paused until classification is resolved.
            `;

              await upsertComment(comment);

              core.setFailed(
                'Missing program classification'
              );

              return;
            }

            // ----------------------------------------
            // MULTIPLE ACTUAL PROGRAMS
            // ----------------------------------------

            if (detectedActualPrograms.length > 1) {

              await clearProgramLabels();

              await addLabels([
                INVALID_LABEL
              ]);

              const comment =
                `${MARKER}

            ## ⚠️ Invalid Program Classification

            Multiple contribution programs were detected in this PR.

            Please keep ONLY ONE classification:

            - GSSOC
            - NSOC
            - General Contribution

            Detected:

            ${detectedActualPrograms
              .map(p => `- ${p}`)
              .join('\n')}

            After editing your PR body, validation will automatically re-run.

            > Stage-2 review routing is temporarily paused until this is fixed.
            `;

              await upsertComment(comment);

              core.setFailed(
                'Multiple program classifications detected'
              );

              return;
            }

            // ----------------------------------------
            // ACTUAL PROGRAM + FALLBACK CONFLICT
            // ----------------------------------------

            if (
              detectedActualPrograms.length === 1 &&
              hasGeneralContribution
            ) {

              await clearProgramLabels();

              await addLabels([
                INVALID_LABEL
              ]);

              const comment =
                `${MARKER}

            ## ⚠️ Conflicting Classification

            Your PR has selected BOTH a specific program (GSSoC26/NSoC26) AND "General Contribution".

            Please select ONLY ONE:

            - GSSOC26
            - NSoC26
            - General Contribution

            After editing your PR body, validation will automatically re-run.

            > Stage-2 review routing is temporarily paused until this is fixed.
            `;

              await upsertComment(comment);

              core.setFailed(
                'Multiple program classifications detected'
              );

              return;
            }

            // ----------------------------------------
            // VALID SINGLE ACTUAL PROGRAM
            // ----------------------------------------

            const program =
              detectedActualPrograms[0];

            await clearValidationLabels();
            await clearProgramLabels();

            let finalLabel =
              'general-oss';

            if (program === 'gssoc') {
              finalLabel = 'gssoc26';
            }

            if (program === 'nsoc') {
              finalLabel = 'nsoc26';
            }

            await addLabels([finalLabel]);

            const successComment =
              `${MARKER}

            ## ✅ Program Classification Verified

            Detected contribution program:

            - ${program.toUpperCase()}

            Program-aware automation and routing are now enabled for this PR.
            `;

            await upsertComment(successComment);

            core.info(
              `Validated program: ${program}`
            );
