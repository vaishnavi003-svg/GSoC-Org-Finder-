name: 🏆 Mentor Leaderboard

on:
  pull_request_target:
    types:
      - closed

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: mentor-leaderboard
  cancel-in-progress: false

jobs:
  update-mentor-leaderboard:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Mentor Leaderboard
        id: leaderboard
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const mentors = {
              reviewers: [
                "12fahed",
                "4f4d",
                "aanjalii01",
                "adithyan-css",
                "AditthyaSS",
                "AnirbansarkarS",
                "AnirudhPhophalia",
                "anubhavxdev",
                "Anushreebasics",
                "aryanbhutani26",
                "ayu-yishu13",
                "Ayush-Patel-56",
                "Ayushh-Sharmaa",
                "Balaji91221",
                "BandhiyaHardik",
                "coder-zs-cse",
                "CoderOggy78",
                "deepak0x",
                "deepaksinghh12",
                "DevROHIT11",
                "Haile-12",
                "itsdakshjain",
                "JoeCelaster",
                "kallal79",
                "KaranGupta2005",
                "knoxiboy",
                "KumarNirupam1",
                "lourduradjou",
                "lovestaco",
                "magic-peach",
                "Maxd646",
                "MAYANKSHARMA01010",
                "Mohit-368",
                "morningstarxcdcode",
                "Mrigakshi-Rathore",
                "MUKUL-PRASAD-SIGH",
                "nihalawasthi",
                "nitinog10",
                "oasis-parzival",
                "piyushdotcomm",
                "Precise-Goals",
                "preetbiswas12",
                "rounakkraaj-1744",
                "sabeenaviklar",
                "Sagar-Datkhile",
                "Satya900",
                "saurabh24thakur",
                "Shravanthi20",
                "sparshagarwal0411",
                "SparshM8",
                "stealthwhizz",
                "subratamondalnsec",
                "Suvanwita",
                "SyedImtiyaz-1",
                "TarunyaProgrammer",
                "thakurutkarsh22",
                "uddalak2005",
                "vanshaggarwal07"
              ]
            };

            const mentorSet = new Set(
              mentors.reviewers.map(m => m.toLowerCase())
            );

            const stats = {};

            for (const mentor of mentors.reviewers) {
              stats[mentor] = {
                reviews: 0,
                score: 0
              };
            }

            core.info('Fetching merged pull requests...');

            const pulls = await github.paginate(
              github.rest.pulls.list,
              {
                owner,
                repo,
                state: 'closed',
                per_page: 100
              }
            );

            const mergedPRs = pulls.filter(pr => pr.merged_at);

            core.info(`Found ${mergedPRs.length} merged PRs`);

            for (const pr of mergedPRs) {
              try {
                const reviews = await github.paginate(
                  github.rest.pulls.listReviews,
                  {
                    owner,
                    repo,
                    pull_number: pr.number,
                    per_page: 100
                  }
                );

                for (const review of reviews) {

                  if (!review.user || !review.user.login) {
                    continue;
                  }

                  const reviewer = review.user.login;

                  if (
                    reviewer.toLowerCase() ===
                    pr.user.login.toLowerCase()
                  ) {
                    continue;
                  }

                  if (
                    !mentorSet.has(reviewer.toLowerCase())
                  ) {
                    continue;
                  }

                  if (
                    review.state !== 'APPROVED' &&
                    review.state !== 'CHANGES_REQUESTED'
                  ) {
                    continue;
                  }

                  const body = (review.body || '').trim();

                  let points = 0;

                  if (body.length >= 120) {
                    points = 5;
                  } else if (body.length >= 40) {
                    points = 3;
                  } else {
                    points = 2;
                  }

                  if (review.state === 'CHANGES_REQUESTED') {
                    points += 1;
                  }

                  if (!stats[reviewer]) {
                    stats[reviewer] = {
                      reviews: 0,
                      score: 0
                    };
                  }

                  stats[reviewer].reviews++;
                  stats[reviewer].score += points;
                }

              } catch (error) {
                core.warning(
                  `Failed processing PR #${pr.number}: ${error.message}`
                );
              }
            }

            const leaderboard = Object.entries(stats)
              .sort((a, b) => {
                if (b[1].score !== a[1].score) {
                  return b[1].score - a[1].score;
                }

                return b[1].reviews - a[1].reviews;
              });

            let markdown = '# 🏆 Mentor Review Leaderboard\n\n';

            markdown +=
              '> Tracks mentor review activity and review quality across all merged pull requests.\n\n';

            markdown +=
              '| Rank | Mentor | Reviews | Score |\n';

            markdown +=
              '|------|--------|---------|-------|\n';

            leaderboard.forEach(([mentor, data], index) => {

              const medals = ['🥇', '🥈', '🥉'];
              const medal = medals[index] || `${index + 1}`;

              markdown +=
                `| ${medal} | @${mentor} | ${data.reviews} | ${data.score} |\n`;
            });

            markdown += '\n';
            markdown += `Last updated: ${new Date().toUTCString()}\n`;

            fs.writeFileSync(
              '.github/reviewers/mentor-leaderboard.md',
              markdown
            );

            fs.writeFileSync(
              '.github/reviewers/mentor-stats.json',
              JSON.stringify(stats, null, 2)
            );

            core.setOutput(
              'leaderboard',
              JSON.stringify(leaderboard.slice(0, 5))
            );

      - name: Create Leaderboard Update PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update mentor leaderboard"
          title: "chore: update mentor leaderboard"
          body: |
            Automated mentor leaderboard update.

            - Updated mentor review rankings
            - Updated mentor scores
            - Updated mentor stats
          branch: automated/mentor-leaderboard-update
          delete-branch: true

      - name: Post Mentor Leaderboard Comment
        if: github.event.pull_request.merged == true
        uses: actions/github-script@v7
        env:
          LEADERBOARD: ${{ steps.leaderboard.outputs.leaderboard }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const leaderboard = JSON.parse(
              process.env.LEADERBOARD || '[]'
            );

            const prUrl = process.env.PR_URL;

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const prNumber =
              context.payload.pull_request.number;

            let body = '';

            body += '# 🏆 Mentor Review Leaderboard\n\n';

            body +=
              'Top mentor reviewers of all time:\n\n';

            body +=
              '| Rank | Mentor | Reviews | Score |\n';

            body +=
              '|---|---|---|---|\n';

            leaderboard.forEach((entry, index) => {

              const mentor = entry[0];
              const data = entry[1];

              const medals = ['🥇', '🥈', '🥉'];

              const rank =
                medals[index] || `${index + 1}`;

              const avatar =
                `https://github.com/${mentor}.png?size=40`;

              body +=
                `| ${rank} | <img src="${avatar}" width="24" height="24"/> @${mentor} | ${data.reviews} | ${data.score} |\n`;
            });

            body += '\n---\n';

            body +=
              'Review scoring:\n\n';

            body +=
              '- Detailed review → **5 pts**\n';

            body +=
              '- Medium review → **3 pts**\n';

            body +=
              '- Quick review → **2 pts**\n';

            body +=
              '- Changes requested bonus → **+1 pt**\n\n';

            if (prUrl) {
              body +=
                `🔗 Leaderboard Update PR: ${prUrl}\n\n`;
            }

            body +=
              'Thank you to all mentors reviewing PRs! 🚀';

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body
            });
