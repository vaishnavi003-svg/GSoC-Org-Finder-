name: Issue Context Assignment

on:
  issues:
    types:
      - opened
      - edited
      - reopened

  issue_comment:
    types:
      - created

permissions:
  issues: write
  pull-requests: read
  contents: read

concurrency:
  group: issue-assignment-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  assign:
    if: |
      github.event.issue.pull_request == null &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Detect commands
        id: cmd
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 #v9.0.0
        with:
          script: |
            const body = (context.payload.comment?.body || '').trim();

            const assignMatch  = /^\/assign$/i.test(body);
            const approveMatch = body.match(/^\/approve-assignment\s+@?([\w-]+)/i);

            core.setOutput('is_assign',  String(assignMatch));
            core.setOutput('is_approve', String(!!approveMatch));
            core.setOutput('target_user', approveMatch ? approveMatch[1].toLowerCase() : '');

      # ─────────────────────────────────────────────
      # ACTIVE MENTOR CONTEXT REVIEW
      # ─────────────────────────────────────────────

      - name: Select rotating active mentors
        id: mentor_select
        if: |
          steps.cmd.outputs.is_assign != 'true' &&
          steps.cmd.outputs.is_approve != 'true'
        env:
          ISSUE_CLAIMANT: ${{ github.event.issue.user.login }}
          MAX_MENTORS: "2"
          RANDOM_ROTATION: "true"
        run: |
          RESULT=$(node .github/scripts/select-issue-mentors.js)
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Post mentor review request
        if: |
          steps.cmd.outputs.is_assign != 'true' &&
          steps.cmd.outputs.is_approve != 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 #v9.0.0
        env:
          SELECTED_MENTORS_JSON: ${{ steps.mentor_select.outputs.result }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number    = context.issue.number;

            function findBotComment(comments, marker) {
              return comments.find(
                c =>
                  c.user?.login === 'github-actions[bot]' &&
                  c.body?.includes(marker)
              );
            }

            let selected = [];
            try {
              selected = JSON.parse(process.env.SELECTED_MENTORS_JSON || '{}').selected || [];
            } catch {
              selected = [];
            }

            const MENTOR_CONTEXT_MARKER = '<!-- mentor-context-review -->';

            const mentionList = selected.length
              ? selected.map(m => `@${m}`).join(' • ')
              : '_No active mentors available._';

            const avatars = selected
              .map(mentor =>
                `<a href="https://github.com/${mentor}"><img src="https://github.com/${mentor}.png" width="52px" alt="${mentor}" /></a>`
              )
              .join('\n');

            const body = [
              MENTOR_CONTEXT_MARKER,
              '',
              '# 👀 Active Mentor Review Requested',
              '',
              avatars,
              '',
              '### Selected Active Mentors',
              '',
              mentionList,
              '',
              '> Mentors are selected dynamically based on:',
              '> - recent activity',
              '> - review quality',
              '> - merged review history',
              '> - rotation fairness',
              '',
              '### Mentor Tasks',
              '',
              '- verify issue quality',
              '- check duplicates',
              '- validate scope',
              '- decide assignability',
              '',
              '_Mentor rotation updates automatically across issues._'
            ].join('\n');

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );

            const existing = findBotComment(comments, MENTOR_CONTEXT_MARKER);

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      # ─────────────────────────────────────────────
      # /assign FLOW
      # ─────────────────────────────────────────────

      - name: Validate issue assignment
        id: validate
        if: steps.cmd.outputs.is_assign == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 #v9.0.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number    = context.payload.issue.number;
            const claimant        = context.payload.comment.user.login;

            const issue = (
              await github.rest.issues.get({ owner, repo, issue_number })
            ).data;

            if (issue.state !== 'open' || issue.locked) {
              core.setOutput('eligible', 'false');
              return;
            }

            if ((issue.assignees || []).length > 0) {
              core.setOutput('eligible', 'false');
              return;
            }

            const PENDING_MARKER = '<!-- pending-assignment -->';

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );

            const pendingComment = comments.find(
              c =>
                c.user?.login === 'github-actions[bot]' &&
                c.body?.includes(PENDING_MARKER) &&
                !c.body?.includes('✅ Issue Assigned')
            );

            if (pendingComment) {
              core.setOutput('eligible', 'false');
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `⚠️ @${claimant} - an assignment request is already pending mentor approval for this issue. Please wait for the current request to be resolved.`
              });
              return;
            }

            core.setOutput('eligible',     'true');
            core.setOutput('claimant',     claimant);
            core.setOutput('issue_number', String(issue_number));

      - name: Select rotating mentors
        id: assign_mentors
        if: |
          steps.cmd.outputs.is_assign == 'true' &&
          steps.validate.outputs.eligible == 'true'
        env:
          ISSUE_CLAIMANT: ${{ steps.validate.outputs.claimant }}
          MAX_MENTORS: "2"
          RANDOM_ROTATION: "true"
        run: |
          RESULT=$(node .github/scripts/select-issue-mentors.js)
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Post assignment request
        if: |
          steps.cmd.outputs.is_assign == 'true' &&
          steps.validate.outputs.eligible == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 #v9.0.0
        env:
          CLAIMANT: ${{ steps.validate.outputs.claimant }}
          SELECTED_MENTORS_JSON: ${{ steps.assign_mentors.outputs.result }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number    = context.issue.number;
            const claimant        = process.env.CLAIMANT;

            function findBotComment(comments, marker) {
              return comments.find(
                c =>
                  c.user?.login === 'github-actions[bot]' &&
                  c.body?.includes(marker)
              );
            }

            let selected = [];
            try {
              selected = JSON.parse(process.env.SELECTED_MENTORS_JSON || '{}').selected || [];
            } catch {
              selected = [];
            }

            if (selected.length === 0) {
              try {
                const collabs = await github.paginate(
                  github.rest.repos.listCollaborators,
                  { owner, repo, permission: 'admin', per_page: 100 }
                );
                selected = collabs
                  .map(c => c.login)
                  .filter(l => l !== 'github-actions[bot]')
                  .slice(0, 2);
              } catch (err) {
                core.warning(
                  `Admin fallback failed — could not list collaborators: ${err.message || err}. No mentors will be tagged.`
                );
                selected = [];
              }
            }

            const PENDING_MARKER = '<!-- pending-assignment -->';

            const mentions = selected.length
              ? selected.map(m => `@${m}`).join(' • ')
              : '_No active mentors available._';

            const avatars = selected.length
              ? selected
                  .map(mentor =>
                    `<a href="https://github.com/${mentor}"><img src="https://github.com/${mentor}.png" width="52px" alt="${mentor}" /></a>`
                  )
                  .join('\n')
              : '';

            const body = [
              PENDING_MARKER,
              '',
              '# ⏳ Assignment Pending Mentor Approval',
              '',
              avatars,
              '',
              `Requested by @${claimant}`,
              '',
              '### Active Mentors',
              '',
              mentions,
              '',
              '### Approve Using',
              '',
              '```',
              `/approve-assignment @${claimant}`,
              '```',
              '',
              '> Mentors rotate dynamically across issues.'
            ].join('\n');

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );

            const existing = findBotComment(comments, PENDING_MARKER);

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      # ─────────────────────────────────────────────
      # APPROVAL FLOW
      # ─────────────────────────────────────────────

      - name: Process mentor approval
        if: steps.cmd.outputs.is_approve == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 #v9.0.0
        env:
          TARGET_USER: ${{ steps.cmd.outputs.target_user }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number    = context.issue.number;
            const approver        = context.payload.comment.user.login;
            const claimant        = process.env.TARGET_USER;

            function findBotComment(comments, marker) {
              return comments.find(
                c =>
                  c.user?.login === 'github-actions[bot]' &&
                  c.body?.includes(marker)
              );
            }

            const PENDING_MARKER = '<!-- pending-assignment -->';

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );

            const assignmentComment = findBotComment(comments, PENDING_MARKER);

            if (!assignmentComment) {
              core.info('No assignment request found.');
              return;
            }

            const pendingBody = assignmentComment.body || '';

            const requestedByMatch = pendingBody.match(/Requested by @([\w-]+)/i);
            const originalClaimant = requestedByMatch ? requestedByMatch[1].toLowerCase() : null;

            if (!originalClaimant) {
              core.warning('Could not determine original claimant from pending comment.');
              return;
            }

            if (claimant !== originalClaimant) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `⛔ @${approver} — the username \`@${claimant}\` does not match the original requester \`@${originalClaimant}\` for this issue. Please use \`/approve-assignment @${originalClaimant}\`.`
              });
              return;
            }

            const noMentorsAvailable = pendingBody.includes('_No active mentors available._');
            const isMentorMentioned  = pendingBody.includes(`@${approver}`);

            if (!isMentorMentioned && !noMentorsAvailable) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `⛔ @${approver} is not one of the selected mentors for this issue.`
              });
              return;
            }

            let permissionLevel = 'none';
            try {
              const { data: permData } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: approver
              });
              permissionLevel = permData.permission;
            } catch (err) {
              core.warning(`Permission check failed for @${approver}: ${err.message || err}`);
              permissionLevel = 'none';
            }

            const allowedRoles = ['admin', 'maintain', 'write'];
            if (!allowedRoles.includes(permissionLevel)) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `⛔ @${approver} does not have sufficient repository permissions to approve assignments (requires write, maintain, or admin).`
              });
              return;
            }

            const issue = (
              await github.rest.issues.get({ owner, repo, issue_number })
            ).data;

            if (issue.state !== 'open') {
              core.info('Issue is no longer open — skipping assignment.');
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `⚠️ @${approver} — this issue is no longer open, so the assignment cannot be processed.`
              });
              return;
            }

            if ((issue.assignees || []).length > 0) {
              core.info('Issue already assigned.');
              return;
            }

            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number,
              assignees: [claimant]
            });

            const updatedBody = [
              '<!-- pending-assignment -->',
              '',
              '# ✅ Issue Assigned',
              '',
              `Assigned to @${claimant}`,
              '',
              `Approved by @${approver}`,
              '',
              '> Approved through active mentor review.'
            ].join('\n');

            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: assignmentComment.id,
              body: updatedBody
            });
